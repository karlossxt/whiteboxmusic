<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DESCUBRE | WhiteBox Music</title>
    <meta name="description" content="Descubre nuevos artistas independientes. Explora por género, ciudad o estilo musical.">
    <meta property="og:title" content="DESCUBRE | WhiteBox Music">
    <meta property="og:description" content="Descubre nuevos artistas independientes.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="logo.png">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background-image: url("https://www.transparenttextures.com/patterns/carbon-fibre.png");
        }

        .hero-section {
            padding: 150px 20px 80px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-title {
            font-family: 'Oswald', sans-serif;
            font-size: 12vw;
            color: var(--pink);
            text-transform: uppercase;
            line-height: 0.8;
            letter-spacing: -5px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            text-shadow: 5px 5px 0px rgba(231, 114, 167, 0.2);
        }

        .main-title i {
            font-size: 0.6em;
            vertical-align: middle;
        }

        .search-wrapper {
            width: 100%;
            max-width: 600px;
            margin-top: 40px;
            position: relative;
        }

        .search-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 3px solid var(--pink);
            padding: 15px 50px 15px 20px;
            font-size: 1.5rem;
            color: white;
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
            outline: none;
            transition: var(--transition);
        }

        .search-input:focus {
            border-bottom: 3px solid white;
            box-shadow: 0 10px 20px -10px var(--pink);
        }

        .search-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--pink);
            font-size: 1.2rem;
        }

        .descubre-grid {
            padding: 50px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .artist-card {
            aspect-ratio: 1/1;
            position: relative;
            overflow: hidden;
            border: 1px solid #222;
            cursor: pointer;
            background-color: var(--gray);
        }

        .card-img {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: grayscale(100%) contrast(1.2);
            transition: transform 0.8s cubic-bezier(0.2, 1, 0.3, 1), filter 0.5s ease;
        }

        .artist-card:hover .card-img {
            transform: scale(1.1);
            filter: grayscale(0%) contrast(1);
        }

        .card-info {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%;
            padding: 30px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            color: white;
            transform: translateY(10px);
            transition: var(--transition);
        }

        .artist-card:hover .card-info {
            transform: translateY(0);
        }

        .artist-name {
            font-family: 'Oswald', sans-serif;
            font-size: 2.2rem;
            text-transform: uppercase;
            line-height: 0.9;
            margin-bottom: 10px;
        }

        .tags-row {
            display: flex; gap: 8px; flex-wrap: wrap;
        }

        .tag {
            border: 1px solid white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 900;
            text-transform: uppercase;
        }

        .artist-card:hover .tag {
            border-color: var(--pink);
            color: var(--pink);
        }

        .float-btn {
            position: absolute;
            top: 20px; right: 20px;
            width: 45px; height: 45px;
            border: 2px solid white;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem;
            color: white;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            transition: var(--transition);
        }

        .artist-card:hover .float-btn {
            background: var(--pink);
            border-color: var(--pink);
            transform: rotate(90deg);
        }

        @media (max-width: 768px) {
            .main-title { font-size: 20vw; letter-spacing: -2px; }
            .descubre-grid { padding: 20px; }
        }

        .site-footer {
            background: #000;
            color: #fff;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
        }

        .site-footer a {
            color: #fff;
            text-decoration: none;
        }

        .site-footer a:hover {
            color: var(--pink);
        }

        .social-icons {
            display: flex;
            gap: 15px;
        }

        .social-icons a {
            font-size: 14px;
            transition: 0.3s;
        }

        .social-icons a:hover {
            color: var(--pink);
        }
    </style>
</head>
<body class="no-sidebar">

    <header>
        <nav class="nav-links">
            <a href="index.html">HOME</a>
            <a href="entreE.html">ENTREVISTAS</a>

            <a href="fotos.html">FOTOS</a>
            <a href="contacto.html">CONTACTO</a>
        </nav>
    </header>

    <main>
        
        <section class="hero-section">
            <h1 class="main-title">
                DESCUBRE <i class="fa-solid fa-headphones"></i>

            <div class="search-wrapper">
                <input type="text" class="search-input" placeholder="BUSCAR ARTISTA, GÉNERO O CIUDAD...">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>

        <section class="descubre-grid">
            
            <div class="artist-card">

                <div class="float-btn">+</div>

                    <div class="tags-row">

                </div>
            </div>

            <div class="artist-card">

                <div class="float-btn">+</div>
                <div class="card-info">
                    <h2 class="artist-name">THE LAST<br>INTERNATIONALE</h2>

                    </div>
                </div>
            </div>

            <div class="artist-card">
                <img src="https://images.pexels.com/photos/257904/pexels-photo-257904.jpeg" class="card-img" alt="SIA" loading="lazy">
                <div class="float-btn">+</div>
                <div class="card-info">

            </div>

            <div class="artist-card">
                <img src="https://images.pexels.com/photos/210922/pexels-photo-210922.jpeg" class="card-img" alt="WhiteBox Live" loading="lazy">
                <div class="float-btn">+</div>
                <div class="card-info">
                    <h2 class="artist-name">WHITEBOX<br>LIVE</h2>
                    <div class="tags-row">
                        <span class="tag">SESSIONS</span>
                        <span class="tag">LONDON</span>
                    </div>

            </div>

        </section>

    </main>

    <footer class="site-footer">

            <a href="#" title="TikTok"><i class="fa-brands fa-tiktok"></i></a>

</body>
